<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cours théorique - Révision TP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cours">
  <div id="siteShell"></div>
  <main class="page">
    <section class="page-head">
      <p class="eyebrow">Fiches rapides</p>
      <h1>Cours théorique</h1>
      <p>Définitions simples, utilité en TP, exemples concrets, commandes ou réglages liés, erreurs fréquentes et mini-questions possibles.</p>
    </section>
    <section class="toolbar">
      <label class="search-field">
        <span>Rechercher</span>
        <input id="theorySearch" type="search" placeholder="Ex. RBW, DHCP, échantillonnage...">
      </label>
      <label>
        <span>Famille</span>
        <select id="theoryGroup"></select>
      </label>
    </section>
    <section id="theoryList" class="theory-grid"></section>
  </main>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
